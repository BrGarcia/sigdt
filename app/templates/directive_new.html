<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Novo Cadastro de Diretiva - SIGDT</title>
    <link rel="icon" type="image/png" href="/static/img/favicon.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        function getCookie(name) {
            let cookieValue = null;
            if (document.cookie && document.cookie !== '') {
                const cookies = document.cookie.split(';');
                for (let i = 0; i < cookies.length; i++) {
                    const cookie = cookies[i].trim();
                    if (cookie.substring(0, name.length + 1) === (name + '=')) {
                        cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                        break;
                    }
                }
            }
            return cookieValue;
        }

        document.addEventListener('DOMContentLoaded', function() {
            const token = getCookie('csrftoken');
            if (token) {
                const forms = document.querySelectorAll('form[method="post"]');
                forms.forEach(form => {
                    const input = document.createElement('input');
                    input.type = 'hidden'; input.name = 'csrf-token'; input.value = token;
                    form.appendChild(input);
                });
            }
        });
    </script>
</head>
<body class="bg-gray-100 font-sans leading-normal tracking-normal">
    <nav class="bg-blue-900 p-4 shadow-lg text-white">
        <div class="container mx-auto flex justify-between items-center">
            <a href="/" class="text-2xl font-bold tracking-tight hover:text-blue-300 transition-colors">SIGDT</a>
            <div class="space-x-6 flex items-center">
                <a href="/" class="text-sm font-medium hover:text-blue-300 transition-colors">Dashboard</a>
                <a href="/master-directives" class="text-sm font-medium hover:text-blue-300 transition-colors">Diretivas</a>
                {% if current_user and current_user.role == 'admin' %}
                    <a href="/users/manage" class="text-sm font-medium hover:text-blue-300 transition-colors">Usuários</a>
                {% endif %}
                <button id="logout-button" class="text-sm font-medium hover:text-red-300 transition-colors ml-4">Logout</button>
            </div>
        </div>
    </nav>

    <main class="container mx-auto mt-8 p-4">
        <div class="max-w-4xl mx-auto bg-white rounded-lg shadow-sm p-8 border border-gray-200">
            <h2 class="text-2xl font-bold text-gray-800 mb-6">Cadastrar Nova Diretiva Técnica</h2>
            
            <form action="/directives/new" method="post" class="space-y-8">
                <!-- Seção 1: Aeronave -->
                <div class="border-b pb-6">
                    <h3 class="text-lg font-semibold text-blue-900 mb-4 flex items-center">
                        <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path></svg>
                        Dados da Aeronave
                    </h3>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div>
                            <label for="matricula" class="block text-sm font-medium text-gray-700">Matrícula (Ex: PR-ABC)</label>
                            <input type="text" name="matricula" id="matricula" required placeholder="PR-..."
                                class="mt-1 block w-full border rounded-md shadow-sm py-2 px-3 focus:ring-blue-500 focus:border-blue-500 uppercase">
                        </div>
                        <div>
                            <label for="numero_serie" class="block text-sm font-medium text-gray-700">Número de Série (SN)</label>
                            <input type="text" name="numero_serie" id="numero_serie" required
                                class="mt-1 block w-full border rounded-md shadow-sm py-2 px-3 focus:ring-blue-500 focus:border-blue-500">
                        </div>
                    </div>
                </div>

                <!-- Seção 2: Diretiva Master -->
                <div class="border-b pb-6">
                    <h3 class="text-lg font-semibold text-blue-900 mb-4 flex items-center">
                        <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                        Dados Técnicos (Master)
                    </h3>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div>
                            <label for="fadt" class="block text-sm font-medium text-gray-700">FADT (Identificador Único)</label>
                            <input type="text" name="fadt" id="fadt" required
                                class="mt-1 block w-full border rounded-md shadow-sm py-2 px-3 focus:ring-blue-500 focus:border-blue-500 font-mono">
                        </div>
                        <div>
                            <label for="codigo_diretiva" class="block text-sm font-medium text-gray-700">Código da Diretiva (Ex: AD 2024-01)</label>
                            <input type="text" name="codigo_diretiva" id="codigo_diretiva" required
                                class="mt-1 block w-full border rounded-md shadow-sm py-2 px-3 focus:ring-blue-500 focus:border-blue-500">
                        </div>
                        <div class="md:col-span-2">
                            <label for="objetivo" class="block text-sm font-medium text-gray-700">Objetivo / Descrição</label>
                            <textarea name="objetivo" id="objetivo" rows="3" required
                                class="mt-1 block w-full border rounded-md shadow-sm py-2 px-3 focus:ring-blue-500 focus:border-blue-500"></textarea>
                        </div>
                        <div>
                            <label for="classe" class="block text-sm font-medium text-gray-700">Classe (G)</label>
                            <select name="classe" id="classe" class="mt-1 block w-full border rounded-md shadow-sm py-2 px-3 focus:ring-blue-500 focus:border-blue-500">
                                <option value="M">M - Máxima (5)</option>
                                <option value="R">R - Regular (4)</option>
                                <option value="O">O - Opcional (2)</option>
                                <option value="I" selected>I - Informativa (1)</option>
                            </select>
                        </div>
                        <div>
                            <label for="categoria" class="block text-sm font-medium text-gray-700">Categoria (U)</label>
                            <select name="categoria" id="categoria" class="mt-1 block w-full border rounded-md shadow-sm py-2 px-3 focus:ring-blue-500 focus:border-blue-500">
                                <option value="I">I - Imediata (5)</option>
                                <option value="U">U - Urgente (4)</option>
                                <option value="R" selected>R - Rotina (2)</option>
                            </select>
                        </div>
                    </div>

                    <div class="mt-6">
                        <label class="block text-sm font-medium text-gray-700 mb-2">Especialidades Responsáveis</label>
                        <div class="grid grid-cols-2 md:grid-cols-4 gap-3 p-4 bg-gray-50 rounded-md border">
                            {% for code in Especialidade.list_codes() %}
                            <div class="flex items-center">
                                <input type="checkbox" name="especialidades" value="{{ code }}" id="spec-{{ code }}"
                                    class="h-4 w-4 text-blue-600 focus:ring-blue-500 border-gray-300 rounded cursor-pointer">
                                <label for="spec-{{ code }}" class="ml-2 block text-xs text-gray-700 cursor-pointer">{{ code }}</label>
                            </div>
                            {% endfor %}
                        </div>
                    </div>
                </div>

                <!-- Seção 3: Status de Execução -->
                <div>
                    <h3 class="text-lg font-semibold text-blue-900 mb-4 flex items-center">
                        <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"></path></svg>
                        Status de Execução nesta Aeronave
                    </h3>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div>
                            <label for="status" class="block text-sm font-medium text-gray-700">Status Atual</label>
                            <select name="status" id="status" class="mt-1 block w-full border rounded-md shadow-sm py-2 px-3 focus:ring-blue-500 focus:border-blue-500">
                                <option value="Pendente" selected>Pendente</option>
                                <option value="Em andamento">Em andamento</option>
                                <option value="Concluída">Concluída</option>
                                <option value="Não aplicável">Não aplicável</option>
                            </select>
                        </div>
                        <div>
                            <label for="tendencia" class="block text-sm font-medium text-gray-700">Tendência (T) - Peso GUT</label>
                            <select name="tendencia" id="tendencia" class="mt-1 block w-full border rounded-md shadow-sm py-2 px-3 focus:ring-blue-500 focus:border-blue-500">
                                <option value="5">5 - Piora Imediata</option>
                                <option value="4">4 - Piora a Curto Prazo</option>
                                <option value="3" selected>3 - Piora a Médio Prazo</option>
                                <option value="2">2 - Piora a Longo Prazo</option>
                                <option value="1">1 - Não Piora</option>
                            </select>
                        </div>
                        <div class="md:col-span-2">
                            <label for="observacao" class="block text-sm font-medium text-gray-700">Observações de Execução</label>
                            <textarea name="observacao" id="observacao" rows="3"
                                class="mt-1 block w-full border rounded-md shadow-sm py-2 px-3 focus:ring-blue-500 focus:border-blue-500"></textarea>
                        </div>
                    </div>
                </div>

                <div class="flex justify-end space-x-4 pt-6">
                    <a href="/" class="bg-gray-200 text-gray-700 py-2 px-6 rounded-md hover:bg-gray-300 transition-colors font-medium">Cancelar</a>
                    <button type="submit" class="bg-blue-900 text-white py-2 px-8 rounded-md hover:bg-blue-800 transition-all font-bold shadow-md">Cadastrar Diretiva</button>
                </div>
            </form>
        </div>
    </main>

    <script>
        document.getElementById('logout-button').addEventListener('click', async function() {
            try {
                const response = await fetch('/users/logout', { method: 'POST' });
                if (response.ok) { window.location.href = '/login'; }
            } catch (error) { console.error('Logout failed', error); window.location.href = '/login'; }
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIGDT - Sistema de Gestão de Diretivas Técnicas</title>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans leading-normal tracking-normal">
    <nav class="bg-blue-800 p-4 shadow-lg text-white">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold">SIGDT</h1>
            <div>
                <a href="/" class="hover:text-gray-300">Home</a>
            </div>
        </div>
    </nav>

    <main class="container mx-auto mt-10 p-4">
        <div class="bg-white rounded-lg shadow-md p-6">
            <h2 class="text-3xl font-semibold mb-4 text-gray-800">{{ message }}</h2>
            <p class="text-gray-600 mb-6">
                Sistema de Gestão de Diretivas Técnicas (DT) para manutenção aeronáutica.
            </p>
            
            <div id="content" class="mt-8">
                <!-- HTMX will swap content here -->
                <button hx-get="/health" hx-target="#health-status" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded transition duration-300">
                    Verificar Saúde do Sistema
                </button>
                <div id="health-status" class="mt-4 text-sm font-mono text-gray-500"></div>
            </div>
        </div>
    </main>

    <footer class="mt-20 p-8 border-t border-gray-200 text-center text-gray-500 text-sm">
        &copy; 2026 SIGDT - Sistema de Gestão de Diretivas Técnicas
    </footer>
</body>
</html>

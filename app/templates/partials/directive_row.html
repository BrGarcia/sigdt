<tr id="diretiva-{{ diretiva.id }}" class="hover:bg-gray-50 transition-colors">
    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-900 font-mono">{{ diretiva.sn_cjm }}</td>
    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-700" title="{{ diretiva.objetivo }}">{{ diretiva.diretiva_tecnica }}</td>
    <td class="px-6 py-4 whitespace-nowrap text-sm text-center">
        <span class="px-2 py-1 rounded text-xs font-bold 
            {% if diretiva.cla == 'M' %}bg-red-100 text-red-800
            {% elif diretiva.cla == 'R' %}bg-yellow-100 text-yellow-800
            {% else %}bg-blue-100 text-blue-800{% endif %}">
            {{ diretiva.cla }}
        </span>
    </td>
    <td class="px-6 py-4 whitespace-nowrap text-sm text-center">
        <span class="px-2 py-1 rounded text-xs font-bold 
            {% if diretiva.cat == 'I' %}bg-red-100 text-red-800
            {% elif diretiva.cat == 'U' %}bg-orange-100 text-orange-800
            {% else %}bg-green-100 text-green-800{% endif %}">
            {{ diretiva.cat }}
        </span>
    </td>
    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">
        <form hx-post="/update-tendencia/{{ diretiva.id }}" hx-target="#diretiva-{{ diretiva.id }}" hx-swap="outerHTML" class="flex items-center space-x-2">
            <input type="number" name="tendencia" value="{{ diretiva.tendencia }}" min="1" max="5" 
                class="w-16 border rounded px-1 py-1 focus:ring-2 focus:ring-blue-500"
                onchange="this.form.dispatchEvent(new Event('submit'))">
        </form>
    </td>
    <td class="px-6 py-4 whitespace-nowrap text-sm font-bold text-gray-900">{{ diretiva.gut }}</td>
</tr>

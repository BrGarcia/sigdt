<tr id="diretiva-{{ diretiva.id }}" class="hover:bg-gray-50 transition-colors cursor-pointer" onclick="window.location.href='/directives/{{ diretiva.id }}'">
    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-900 font-mono">{{ diretiva.pn }} / {{ diretiva.cff }}</td>
    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-900 font-mono">{{ diretiva.matr }}</td>
    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-700" title="{{ diretiva.objetivo }}">{{ diretiva.diretiva_tecnica }}</td>
    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">{{ diretiva.status }}</td>
    <td class="px-6 py-4 whitespace-nowrap text-sm text-center">
        <span class="px-2 py-1 rounded text-xs font-bold 
            {% if diretiva.cla == 'M' %}bg-red-100 text-red-800
            {% elif diretiva.cla == 'R' %}bg-yellow-100 text-yellow-800
            {% else %}bg-blue-100 text-blue-800{% endif %}">
            {{ diretiva.cla }}
        </span>
        <span class="ml-2 px-2 py-1 rounded text-xs font-bold 
            {% if diretiva.cat == 'I' %}bg-red-100 text-red-800
            {% elif diretiva.cat == 'U' %}bg-orange-100 text-orange-800
            {% else %}bg-green-100 text-green-800{% endif %}">
            {{ diretiva.cat }}
        </span>
    </td>
</tr>

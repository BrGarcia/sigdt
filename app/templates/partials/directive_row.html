<tr id="diretiva-link-{{ diretiva.id }}" class="hover:bg-gray-50 transition-colors cursor-pointer" onclick="window.location.href='/directives/{{ diretiva.id }}'" title="Objetivo: {{ diretiva.diretiva.objetivo }}">
    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-900 font-mono">
        {{ diretiva.aeronave.matricula }}
    </td>
    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-700">
        {{ diretiva.diretiva.codigo_diretiva }}
    </td>
    <td class="px-6 py-4 whitespace-nowrap">
        <span class="px-2 inline-flex text-xs leading-5 font-semibold rounded-full 
            {% if diretiva.status == 'Concluída' %}bg-green-100 text-green-800
            {% elif diretiva.status == 'Pendente' %}bg-red-100 text-red-800
            {% else %}bg-yellow-100 text-yellow-800{% endif %}">
            {{ diretiva.status }}
        </span>
    </td>
    <td class="px-6 py-4 whitespace-nowrap text-sm text-center">
        <span class="px-2 py-1 rounded text-xs font-bold 
            {% if diretiva.diretiva.classe == 'M' %}bg-red-100 text-red-800
            {% elif diretiva.diretiva.classe == 'R' %}bg-yellow-100 text-yellow-800
            {% else %}bg-blue-100 text-blue-800{% endif %}">
            {{ diretiva.diretiva.classe or '-' }}
        </span>
        <span class="ml-2 px-2 py-1 rounded text-xs font-bold 
            {% if diretiva.diretiva.categoria == 'I' %}bg-red-100 text-red-800
            {% elif diretiva.diretiva.categoria == 'U' %}bg-orange-100 text-orange-800
            {% else %}bg-green-100 text-green-800{% endif %}">
            {{ diretiva.diretiva.categoria or '-' }}
        </span>
    </td>
    <td class="px-6 py-4 whitespace-nowrap text-sm font-bold text-blue-900">
        {{ diretiva.gut }}
    </td>
</tr>

<table class="min-w-full divide-y divide-gray-200">
    <thead class="bg-gray-50">
        <tr>
            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">FADT</th>
            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">MATRÍCULA</th>
            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">DT / CÓDIGO</th>
            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">STATUS</th>
            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">CLA / CAT</th>
            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">GUT</th>
        </tr>
    </thead>

    <tbody class="bg-white divide-y divide-gray-200" id="directives-body">
        {% if diretivas %}
            {% for link in diretivas %}
                {% with diretiva=link %}
                    {% include 'partials/directive_row.html' %}
                {% endwith %}
            {% endfor %}
        {% else %}
            <tr>
                <td colspan="6" class="px-6 py-10 text-center text-gray-500 italic">
                    Nenhuma diretiva encontrada.
                </td>
            </tr>
        {% endif %}
    </tbody>
</table>

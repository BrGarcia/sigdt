<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciamento de Usuários - SIGDT</title>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans leading-normal tracking-normal">
    <nav class="bg-blue-900 p-4 shadow-lg text-white">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold tracking-tight">SIGDT</h1>
            <div class="space-x-4">
                <a href="/" class="hover:text-blue-300 transition-colors">Dashboard</a>
                <a href="/users/manage" class="hover:text-blue-300 transition-colors">Gerenciar Usuários</a>
                <button id="logout-button" class="hover:text-red-300 transition-colors">Logout</button>
            </div>
        </div>
    </nav>

    <main class="container mx-auto mt-8 p-4">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <!-- Create User Form -->
            <div class="bg-white rounded-lg shadow-sm p-6 border border-gray-200">
                <h3 class="text-lg font-semibold mb-4 text-gray-800">Criar Novo Inspetor</h3>
                <form hx-post="/users/" hx-target="#user-list" hx-swap="beforeend" class="space-y-4">
                    <div>
                        <label for="username" class="block text-sm font-medium text-gray-700">Usuário</label>
                        <input type="text" name="username" id="username" required class="mt-1 block w-full border rounded-md shadow-sm py-2 px-3 focus:ring-blue-500 focus:border-blue-500">
                    </div>
                    <div>
                        <label for="email" class="block text-sm font-medium text-gray-700">Email</label>
                        <input type="email" name="email" id="email" required class="mt-1 block w-full border rounded-md shadow-sm py-2 px-3 focus:ring-blue-500 focus:border-blue-500">
                    </div>
                    <div>
                        <label for="password" class="block text-sm font-medium text-gray-700">Senha</label>
                        <input type="password" name="password" id="password" required class="mt-1 block w-full border rounded-md shadow-sm py-2 px-3 focus:ring-blue-500 focus:border-blue-500">
                    </div>
                    <button type="submit" class="w-full bg-blue-900 text-white py-2 px-4 rounded-md hover:bg-blue-800">Criar Inspetor</button>
                </form>
            </div>

            <!-- User List -->
            <div class="bg-white rounded-lg shadow-sm p-6 border border-gray-200">
                <h3 class="text-lg font-semibold mb-4 text-gray-800">Usuários Registrados</h3>
                <div id="user-list" class="space-y-2">
                    {% for user in users %}
                        <div class="flex justify-between items-center p-2 border-b">
                            <span>{{ user.username }} ({{ user.role }})</span>
                            <!-- Add delete/edit buttons here if needed -->
                        </div>
                    {% endfor %}
                </div>
            </div>
        </div>
    </main>

    <script>
        document.getElementById('logout-button').addEventListener('click', function() {
            localStorage.removeItem('access_token');
            window.location.href = '/login';
        });

        htmx.on('htmx:configRequest', function (evt) {
            const token = localStorage.getItem('access_token');
            if (token) {
                evt.detail.headers['Authorization'] = 'Bearer ' + token;
            }
        });
    </script>
</body>
</html>

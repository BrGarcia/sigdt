<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acesso Restrito - SIGDT</title>
    <link rel="icon" type="image/png" href="/static/img/favicon.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        function getCookie(name) {
            let cookieValue = null;
            if (document.cookie && document.cookie !== '') {
                const cookies = document.cookie.split(';');
                for (let i = 0; i < cookies.length; i++) {
                    const cookie = cookies[i].trim();
                    if (cookie.substring(0, name.length + 1) === (name + '=')) {
                        cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                        break;
                    }
                }
            }
            return cookieValue;
        }
    </script>
</head>
<body class="bg-black flex items-center justify-center h-screen">
    <div class="w-full max-w-md bg-gray-900 rounded-lg shadow-2xl p-8 border border-gray-800">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-white tracking-widest">SIGDT</h1>
            <p class="text-gray-500 text-sm mt-2">SISTEMA DE GESTÃO DE DIRETIVAS TÉCNICAS</p>
        </div>
        
        <form action="/gatekeeper" method="post" class="space-y-6">
            <div>
                <label for="password" class="block text-gray-400 text-xs uppercase tracking-widest mb-2 font-semibold">Senha de Acesso</label>
                <input type="password" id="password" name="password" required autofocus
                    class="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-3 text-white focus:ring-2 focus:ring-blue-500 outline-none transition-all text-center tracking-widest">
            </div>
            
            {% if request.query_params.get('error') %}
            <div class="text-red-500 text-xs text-center font-bold animate-pulse">
                SENHA INCORRETA. ACESSO NEGADO.
            </div>
            {% endif %}
            
            <button type="submit"
                class="w-full bg-blue-700 hover:bg-blue-600 text-white font-bold py-3 rounded-lg transition-colors tracking-widest text-sm">
                ENTRAR NO SISTEMA
            </button>
        </form>
        
        <script>
            // Inject CSRF token into traditional forms
            document.addEventListener('DOMContentLoaded', function() {
                const token = getCookie('csrftoken');
                if (token) {
                    const forms = document.querySelectorAll('form[method="post"]');
                    forms.forEach(form => {
                        if (!form.querySelector('input[name="csrf-token"]')) {
                            const input = document.createElement('input');
                            input.type = 'hidden';
                            input.name = 'csrf-token';
                            input.value = token;
                            form.appendChild(input);
                        }
                    });
                }
            });
        </script>
        
        <div class="mt-8 text-center text-gray-600 text-[10px] tracking-tight">
            PROPRIEDADE RESTRITA. O ACESSO NÃO AUTORIZADO É MONITORADO.
        </div>
    </div>
</body>
</html>

{% extends "base.html" %}

{% set hide_navbar = True %}
{% set full_width = True %}

{% block title %}Login - SIGDT{% endblock %}

{% block content %}
<div class="min-h-[70vh] flex items-center justify-center">
    <div class="w-full max-w-md bg-white rounded-xl shadow-xl p-8 border border-gray-100">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-blue-900 tracking-tight">SIGDT</h1>
            <p class="text-gray-500 text-sm mt-2">SISTEMA DE GESTÃO DE DIRETIVAS TÉCNICAS</p>
        </div>

        <form id="login-form" class="space-y-6">
            <div>
                <label for="username" class="block text-sm font-medium text-gray-700 mb-1">Usuário</label>
                <input type="text" id="username" name="username" required autofocus
                    class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-500 outline-none transition-all">
            </div>

            <div>
                <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Senha</label>
                <input type="password" id="password" name="password" required
                    class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-500 outline-none transition-all">
            </div>

            <div id="error-message" class="text-red-600 text-sm text-center font-medium min-h-[1.25rem]"></div>

            <button type="submit"
                class="w-full bg-blue-900 hover:bg-blue-800 text-white font-bold py-3 rounded-lg shadow-md transition-all active:scale-[0.98]">
                ENTRAR NO SISTEMA
            </button>
        </form>

        <div class="mt-8 text-center text-gray-400 text-[10px] tracking-tight uppercase">
            Acesso Restrito - Uso Profissional
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    document.getElementById('login-form').addEventListener('submit', async function (e) {
        e.preventDefault();
        const errorMessage = document.getElementById('error-message');
        errorMessage.textContent = '';

        const formData = new FormData(this);
        const params = new URLSearchParams();
        for (const [key, value] of formData.entries()) {
            params.append(key, value);
        }

        try {
            const response = await fetch('/users/token', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/x-www-form-urlencoded',
                    'x-csrftoken': getCsrfToken()
                },
                body: params
            });

            if (response.ok) {
                window.location.href = '/';
            } else {
                const errorData = await response.json();
                errorMessage.textContent = errorData.detail || 'Falha no login.';
            }
        } catch (error) {
            errorMessage.textContent = 'Ocorreu um erro de rede.';
        }
    });
</script>
{% endblock %}
